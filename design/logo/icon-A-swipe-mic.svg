<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="pc" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff3d8b"/><stop offset="1" stop-color="#55e6ff"/></linearGradient>
    <linearGradient id="pcFill" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff3d8b"/><stop offset="1" stop-color="#55e6ff"/></linearGradient>
    <radialGradient id="bg" cx="0.5" cy="0.0" r="1"><stop offset="0" stop-color="#0c0c12"/><stop offset="1" stop-color="#050507"/></radialGradient>
    <linearGradient id="appbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#15151b"/><stop offset="1" stop-color="#0a0a0c"/></linearGradient>
    <linearGradient id="pinkbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff3d8b"/><stop offset="1" stop-color="#ff6aa8"/></linearGradient>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#appbg)"/><g transform="translate(56 56) scale(2)">
    <g fill="none" stroke="url(#pc)" stroke-linecap="round" stroke-linejoin="round" stroke-width="9">
      <!-- mic head -->
      <rect x="52" y="24" width="40" height="72" rx="20" fill="url(#pcFill)" stroke="none"/>
      <line x1="61" y1="46" x2="83" y2="46" stroke="#050507" stroke-opacity="0.5" stroke-width="4"/>
      <line x1="61" y1="60" x2="83" y2="60" stroke="#050507" stroke-opacity="0.5" stroke-width="4"/>
      <line x1="61" y1="74" x2="83" y2="74" stroke="#050507" stroke-opacity="0.5" stroke-width="4"/>
      <!-- cradle / yoke -->
      <path d="M44 84 a28 28 0 0 0 56 0"/>
      <!-- stand pole -->
      <line x1="72" y1="112" x2="72" y2="150"/>
      <!-- round stand base -->
      <ellipse cx="72" cy="156" rx="30" ry="9"/>
    </g>
    <!-- swipe cue, kept clear of the mic -->
    <g fill="none" stroke="#55e6ff" stroke-linecap="round" stroke-linejoin="round" stroke-width="9">
      <path d="M120 44 l16 18 -16 18" opacity="0.95"/>
      <path d="M140 44 l16 18 -16 18" opacity="0.5"/>
    </g></g></svg>